/* ══ UV Dashboard 2.0 — 分享页面 (与主面板设计系统统一) ══ */
:root {

  /* 学科身份色 */
  --c-math: #378ADD; --c-math-bg: #EBF5FC;
  --c-chinese: #639922; --c-chinese-bg: #F0F7E8;

  /* 状态色 */
  --c-success: #16A34A; --c-success-bg: #DCFCE7; --c-success-text: #166534;
  --c-warning: #CA8A04; --c-warning-bg: #FEF3C7; --c-warning-text: #854D0E;
  --c-danger: #DC2626; --c-danger-bg: #FEE2E2; --c-danger-text: #991B1B;
  --c-accent-red: #E8505B; --c-accent-orange: #E8943B; --c-accent-purple: #8B5CF6;

  /* 顾问标签色 */
  --c-tag-tiancheng: #F5A623; --c-tag-tongchuanghui: #1D9E75; --c-tag-xinbaoli: #378ADD; --c-tag-default: #6B7280;

  /* 背景色阶 */
  --bg-page: #F5F6FA; --bg-panel: #FFFFFF; --bg-card: #FFFFFF; --bg-subtle: #F8F9FB;
  --bg-hover: #F0F4FF; --bg-muted: #F3F4F6;

  /* 文字色阶 */
  --text-primary: #1A1A2E; --text-secondary: #2D3142; --text-tertiary: #6C7293;
  --text-muted: #A0A3BD; --text-disabled: #B5B8C4;

  /* 边框色阶 */
  --border-light: #E8E9F0; --border-default: #E5E7EB; --border-hover: #D1D5DB; --border-focus: #2563EB;

  /* 阴影 */
  --shadow-sm: 0 1px 3px rgba(0,0,0,.06); --shadow-md: 0 4px 12px rgba(0,0,0,.08);
  --shadow-glow: 0 0 0 3px rgba(37,99,235,.1);

  /* 圆角 */
  --r-xs: 3px; --r-sm: 5px; --r-md: 8px; --r-lg: 10px; --r-xl: 12px; --r-pill: 16px;

  /* 动画 */
  --ease-smooth: cubic-bezier(.4,0,.2,1); --ease-bounce: cubic-bezier(.34,1.56,.64,1);
  --duration-fast: .15s; --duration-normal: .25s; --duration-slow: .4s;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
       background: var(--bg-page); color: var(--text-secondary); min-height: 100vh; padding: 24px 20px 48px;
       -webkit-font-smoothing: antialiased; }
.container { max-width: 1040px; margin: 0 auto; }

/* ── Header (品牌渐变条) ── */
h1 { font-size: 22px; font-weight: 700; color: var(--text-primary); margin-bottom: 2px;
     padding-bottom: 10px; border-bottom: 3px solid transparent;
     background-image: var(--c-primary-gradient); background-size: 100% 3px;
     background-repeat: no-repeat; background-position: bottom; }
.subtitle { font-size: 13px; color: var(--text-muted); margin-bottom: 24px; }

.filter-bar { display: flex; gap: 10px; margin-bottom: 20px; align-items: center; flex-wrap: wrap; }
.filter-label { font-size: 12px; color: var(--text-tertiary); }
.filter-text { font-size: 13px; color: var(--text-secondary); }

/* ── KPI Cards ── */
.kpi-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; margin-bottom: 24px; }
.kpi-card { background: var(--bg-panel); border-radius: var(--r-lg); padding: 18px 20px;
            border: 1px solid var(--border-light); box-shadow: var(--shadow-sm);
            transition: transform var(--duration-normal) var(--ease-smooth); }
.kpi-card:hover { transform: translateY(-1px); }
.kpi-label { font-size: 12px; color: var(--text-tertiary); margin-bottom: 6px; font-weight: 500; }
.kpi-value { font-size: 28px; font-weight: 700; color: var(--text-primary); }
.kpi-sub { font-size: 12px; color: var(--c-success); margin-top: 4px; }

.kpi-card.blue { background: linear-gradient(180deg, rgba(55,138,221,.04) 0%, var(--bg-panel) 100%); }
.kpi-card.blue .kpi-value { color: var(--c-math); }
.kpi-card.red { background: linear-gradient(180deg, rgba(232,80,91,.04) 0%, var(--bg-panel) 100%); }
.kpi-card.red .kpi-value { color: var(--c-accent-red); }
.kpi-card.green { background: linear-gradient(180deg, rgba(22,163,74,.04) 0%, var(--bg-panel) 100%); }
.kpi-card.green .kpi-value { color: var(--c-success); }
.kpi-card.amber { background: linear-gradient(180deg, rgba(232,148,59,.04) 0%, var(--bg-panel) 100%); }
.kpi-card.amber .kpi-value { color: var(--c-accent-orange); }

/* ── Chart Card ── */
.chart-card { background: var(--bg-panel); border-radius: var(--r-lg); padding: 22px;
              border: 1px solid var(--border-light); box-shadow: var(--shadow-sm); margin-bottom: 20px; }
.chart-title { font-size: 15px; font-weight: 600; color: var(--text-primary); margin-bottom: 14px; }
.chart-wrap { position: relative; height: 300px; }
.chart-wrap canvas { width: 100% !important; }
.legend-row { display: flex; gap: 18px; margin-bottom: 10px; flex-wrap: wrap; }
.legend-item { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--text-tertiary); }
.legend-dot { width: 10px; height: 10px; border-radius: 2px; display: inline-block; }

/* ── Ranking Grid ── */
.ranking-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 20px; }
.rank-card { background: var(--bg-panel); border-radius: var(--r-lg); padding: 18px;
             border: 1px solid var(--border-light); box-shadow: var(--shadow-sm); }
.rank-card h3 { font-size: 14px; font-weight: 600; color: var(--text-primary); margin: 0 0 14px;
                padding-bottom: 12px; border-bottom: 1px solid var(--border-light);
                display: flex; align-items: center; justify-content: space-between; }
.rank-list { display: flex; flex-direction: column; gap: 4px; }

/* ── Rank Item (卡片式 + 进度条 + stat-row) ── */
.rank-item { display: flex; align-items: center; gap: 12px; padding: 10px 12px; border-radius: var(--r-md);
             background: var(--bg-card); border: 1px solid var(--border-light); cursor: default;
             transition: all var(--duration-normal) var(--ease-smooth); }
.rank-item:hover { background: var(--bg-hover); border-color: var(--c-primary-lighter); }
.rank-num { width: 26px; height: 26px; border-radius: 50%; display: flex; align-items: center; justify-content: center;
            font-size: 11px; font-weight: 700; flex-shrink: 0; background: var(--bg-muted); color: var(--text-tertiary); }
.rank-num.gold { background: linear-gradient(135deg, #F59E0B, #D97706); color: #fff; box-shadow: 0 2px 8px rgba(245,158,11,.3); }
.rank-num.silver { background: linear-gradient(135deg, #94A3B8, #64748B); color: #fff; }
.rank-num.bronze { background: linear-gradient(135deg, #D97706, #B45309); color: #fff; }
.rank-info { flex: 1; min-width: 0; }
.rank-name { font-size: 13px; font-weight: 600; color: var(--text-secondary);
             overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
             display: flex; align-items: center; }
.rank-rate { font-size: 15px; font-weight: 700; flex-shrink: 0; text-align: right; min-width: 48px; }
.rank-rate.high { color: var(--c-success); }
.rank-rate.mid { color: var(--c-warning); }
.rank-rate.low { color: var(--c-danger); }

.rank-bar-wrap { height: 4px; background: var(--bg-muted); border-radius: 2px; overflow: hidden; margin-bottom: 4px; }
.rank-bar-fill { height: 100%; border-radius: 2px; transition: width var(--duration-slow) var(--ease-smooth); }
.rank-bar-fill.high { background: linear-gradient(90deg, #86efac, #22c55e); }
.rank-bar-fill.mid { background: linear-gradient(90deg, #fde68a, #f59e0b); }
.rank-bar-fill.low { background: linear-gradient(90deg, #fca5a5, #ef4444); }

/* ── Rank Stat Row (统一数据行) ── */
.rank-stat-row { display: flex; align-items: stretch; margin-top: 2px; }
.rank-stat-cell { flex: 1; text-align: center; padding: 0 2px; }
.rank-stat-cell + .rank-stat-cell { border-left: 1px solid var(--border-light); }

.rank-stat-cell .rs-val { font-size: 14px; font-weight: 700; line-height: 1; color: var(--text-secondary); }

.empty-hint { text-align: center; color: var(--text-muted); padding: 20px; font-size: 13px; }

.badge-renew.low { background: var(--c-danger-bg); color: var(--c-danger-text); }

/* ── Footer ── */
.footer { text-align: center; color: var(--text-muted); font-size: 11px; padding: 16px; }

@media (max-width: 768px) {
  .kpi-grid { grid-template-columns: repeat(2, 1fr); }
  .ranking-grid { grid-template-columns: 1fr; }
}

function rateColor(rate) {
  if (rate >= 30) return 'high';
  if (rate >= 15) return 'mid';
  return 'low';
}
function medalClass(idx) {
  if (idx === 0) return 'gold';
  if (idx === 1) return 'silver';

}
function getAdvisorTag(name) {
  if (dynamicAdvisorPtMap[name]) return dynamicAdvisorPtMap[name];
  return ADVISOR_POINT_TAG[name] || '';
}
function getAdvisorTagColor(name, isShare) {

  if (!tag) return isShare ? '#8C92A3' : '#6B7280';

  return colorMap[tag] || (isShare ? '#8C92A3' : '#6B7280');

// ── 图表 ──
function renderChart() {
  var ctx = document.getElementById('mainChart').getContext('2d');
  if (mainChart) { mainChart.destroy(); mainChart = null; }

  var periods = PERIODS;
  var activeData = periods.map(function(p) {
    return (STATS.by_period && STATS.by_period[p]) ? (STATS.by_period[p].active_pv || 0) : 0;
  });
  var refundData = periods.map(function(p) {
    return (STATS.by_period && STATS.by_period[p]) ? (STATS.by_period[p].refund_pv || 0) : 0;
  });
  var renewData = periods.map(function(p) {
    return (STATS.by_period && STATS.by_period[p]) ? (STATS.by_period[p].renewed_pv || 0) : 0;
  });
  var rateData = periods.map(function(p, i) {
    return activeData[i] > 0 ? parseFloat((renewData[i] / activeData[i] * 100).toFixed(1)) : 0;
  });

  mainChart = new Chart(ctx, {
    type: 'bar',
    data: {
      labels: periods,
      datasets: [
        { label: '在读 PV', data: activeData, backgroundColor: C.math, stack: 's1', maxBarThickness: 56 },
        { label: '退费 PV', data: refundData, backgroundColor: C.accentRed, stack: 's1', maxBarThickness: 56 },
        { label: '续报 PV', data: renewData, backgroundColor: C.success, stack: 's1', maxBarThickness: 56 },
        { label: '续报率', data: rateData, type: 'line', borderColor: C.accentOrange, backgroundColor: 'rgba(232,148,59,0.1)', fill: false, tension: 0.3, yAxisID: 'y1', pointRadius: 4 },
      ]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      scales: {
        x: { stacked: true },
        y: { stacked: true, beginAtZero: true },
        y1: { position: 'right', beginAtZero: true, max: 100, grid: { display: false } }
      },
      plugins: { legend: { display: false } }
    }
  });
}

// ── 主讲排行（rank-bar进度条 + rank-stat-row统一数据行）──
function renderTeacherRanking() {
  var container = document.getElementById('teacherRankList');
  var mode = teacherRankMode;
  var list = TEACHERS || [];

  if (!list.length) { container.innerHTML = '<div class="empty-hint">暂无数据</div>'; return; }

  // 计算maxRate用于进度条宽度比例
  var maxRate = 0;
  list.forEach(function(t) {
    var rate = mode === 'renewal' ? t.renewal_rate : t.conv_rate;
    if (rate > maxRate) maxRate = rate;
  });
  maxRate = maxRate || 100;

  container.innerHTML = list.slice(0, 10).map(function(t, idx) {
    var medal = medalClass(idx);
    var pillCls = SUBJECT_PILL_CLASS[t.subject] || '';
    var pillText = SUBJECT_SHORT[t.subject] || '';
    var rate = mode === 'renewal' ? t.renewal_rate : t.conv_rate;
    var rc = rateColor(rate);
    var barW = Math.min(rate / maxRate * 100, 100);

    // 统一字段
    var active = t.active || 0;
    var shouldRenew = t.should_renew || 0;
    var newRenewed = t.new_renewed || 0;
    var totalRenewed = t.total_renewed || 0;

    // rank-bar + rank-stat-row
    var barHtml = '<div class="rank-bar-wrap"><div class="rank-bar-fill ' + rc + '" style="width:' + barW + '%"></div></div>';
    var statHtml = '<div class="rank-stat-row">' +
      '<div class="rank-stat-cell"><div class="rs-label">在读</div><div class="rs-val">' + active + '</div></div>' +
      '<div class="rank-stat-cell"><div class="rs-label">应续</div><div class="rs-val">' + shouldRenew + '</div></div>' +
      '<div class="rank-stat-cell"><div class="rs-label">转化</div><div class="rs-val accent">' + newRenewed + '</div></div>' +
      '<div class="rank-stat-cell"><div class="rs-label">已续费</div><div class="rs-val">' + totalRenewed + '</div></div>' +
      '</div>';

    return '<div class="rank-item">' +
      '<div class="rank-num ' + medal + '">' + (idx + 1) + '</div>' +
      '<div class="rank-info"><div class="rank-name"><span class="subj-pill ' + pillCls + '">' + pillText + '</span>' + t.name + '</div>' +
      barHtml + statHtml + '</div>' +
      '<div class="rank-rate ' + rc + '">' + rate + '%</div></div>';
  }).join('');
}

      '<div class="rank-stat-cell"><div class="rs-label">' + dim + '</div><div class="rs-val">' + active + '</div></div>' +
      '<div class="rank-stat-cell"><div class="rs-label">应续</div><div class="rs-val">' + should + '</div></div>' +
      '<div class="rank-stat-cell"><div class="rs-label">转化</div><div class="rs-val accent">' + newR + '</div></div>' +
      '<div class="rank-stat-cell"><div class="rs-label">已转化</div><div class="rs-val">' + total + '</div></div>' +
      '</div>';

    return '<div class="rank-item">' +
      '<div class="rank-num ' + medal + '">' + (idx + 1) + '</div>' +
      '<div class="rank-info"><div class="rank-name">' + tagPill + a.name + '</div>' +
      barHtml + statHtml + '</div>' +
      '<div class="rank-rate ' + rc + '">' + rate + '%</div></div>';
  }).join('');
}

// ── 切换按钮 ──
function switchTeacherMode(mode) {
  teacherRankMode = mode;
  document.querySelectorAll('#teacherRankTitle ~ .mode-toggle .mode-btn').forEach(function(btn) {
    btn.classList.toggle('active', btn.dataset.mode === mode);
  });
  var titleSuffix = mode === 'renewal' ? '续报率排行' : '转化率排行';
  document.getElementById('teacherRankTitle').textContent = '主讲' + titleSuffix;
  renderTeacherRanking();
}

function switchAdvisorMode(mode) {
  advisorRankMode = mode;
  var btns = document.querySelectorAll('#advisorRankTitle ~ div .mode-toggle:first-child .mode-btn');
  btns.forEach(function(btn) { btn.classList.toggle('active', btn.dataset.mode === mode); });
  var titleSuffix = mode === 'renewal' ? '续报排行' : '转化排行';
  document.getElementById('advisorRankTitle').textContent = '顾问' + titleSuffix;
  renderAdvisorRanking();
}

function switchAdvisorUVMode(uvMode) {
  advisorUVMode = uvMode;
  var btns = document.querySelectorAll('#advisorRankTitle ~ div .mode-toggle:last-child .mode-btn');
  btns.forEach(function(btn) { btn.classList.toggle('active', btn.dataset.uv === uvMode); });
  renderAdvisorRanking();
}

// ── 初始化 ──
renderKPIs();
renderChart();
renderTeacherRanking();
renderAdvisorRanking();
</script>
</body>
</html>
