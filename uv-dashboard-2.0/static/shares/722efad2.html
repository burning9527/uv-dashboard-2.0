*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

.kpi-label { font-size: 12px; color: var(--text-tertiary); margin-bottom: 6px; font-weight: 500; }

.legend-row { display: flex; gap: 18px; margin-bottom: 10px; flex-wrap: wrap; }

.rank-list { display: flex; flex-direction: column; gap: 4px; }
.rank-item { display: flex; align-items: center; gap: 12px; padding: 10px 12px; border-radius: var(--r-md); transition: background .15s; cursor: default; }
.rank-item:hover { background: var(--bg-hover); }

.rank-info { flex: 1; min-width: 0; }
.rank-name { font-size: 13px; font-weight: 600; color: var(--text-secondary); margin-bottom: 4px; }
.rank-stats { display: flex; gap: 12px; font-size: 11px; color: var(--text-muted); }

.rank-rate { font-size: 15px; font-weight: 700; flex-shrink: 0; text-align: right; min-width: 48px; }
.rank-rate.high { color: var(--c-success); }
.rank-rate.mid { color: var(--c-warning); }
.rank-rate.low { color: var(--c-danger); }
.empty-hint { text-align: center; color: var(--text-muted); padding: 20px; font-size: 13px; }

.mode-btn { padding: 5px 14px; font-size: 11px; border-radius: var(--r-sm); border: none; cursor: pointer; background: transparent; color: var(--text-tertiary); font-weight: 500; transition: all .2s; white-space: nowrap; }
.mode-btn.active { background: var(--c-primary); color: #fff; font-weight: 600; }

var CURRENT_PERIOD = "\u96f6\u671f";
var PERIOD_CONFIG = {"order": ["\u96f6\u671f", "\u4e00\u671f", "\u4e8c\u671f", "\u4e09\u671f"], "schedule": {"\u96f6\u671f": {"start": "6/29", "end": "7/10", "note": "7/4-5\u4f11\u606f"}, "\u4e00\u671f": {"start": "7/13", "end": "7/24", "note": "7/18-19\u4f11\u606f"}, "\u4e8c\u671f": {"start": "7/27", "end": "8/7", "note": ""}, "\u4e09\u671f": {"start": "8/10", "end": "8/21", "note": ""}}, "current": "\u96f6\u671f"};

var mainChart = null;
var teacherRankMode = 'renewal';
var advisorRankMode = 'renewal';
var advisorUVMode = 'uv';

// ── 动态期次 ──
var PERIODS = (PERIOD_CONFIG && PERIOD_CONFIG.order) || ['零期', '一期', '二期', '三期'];

// ── 颜色常量 (与 CSS :root 同步) ──
var C = {
  primary: '#2563EB', math: '#378ADD', chinese: '#639922', english: '#BA7517',
  success: '#16A34A', successBg: '#DCFCE7', accentRed: '#E8505B', accentOrange: '#E8943B',
  textPrimary: '#1A1A2E', textTertiary: '#6C7293', textMuted: '#999999',
};

var SUBJECT_SHORT = { '雪球思维': '数', '悦读创作': '语', '双语素养': '英' };
var SUBJECT_PILL_CLASS = { '雪球思维': 'sx', '悦读创作': 'yd', '双语素养': 'sy' };

// ── 顾问标签（全称映射 + 动态映射）──
var ADVISOR_POINT_TAG = {
  '陈亮延': '天成大厦', '王达04': '天成大厦', '沈思浩': '天成大厦', '龙倩敏': '天成大厦',
  '戎凯01': '同创汇', '王丽': '同创汇', '苏丽婷': '同创汇',
  '杨林33': '新宝利大厦', '林志豪01': '新宝利大厦', '张敏烨': '新宝利大厦',
};
var POINT_COLOR = { '天成大厦': '#f5a623', '同创汇': '#1d9e75', '新宝利大厦': '#378add' };
var POINT_COLOR_SHARE = { '天成大厦': '#f5a623', '同创汇': '#1d9e75', '新宝利大厦': '#8c92a3' };

// 动态顾问→教学点映射（从后端 advisors 数据构建）
var dynamicAdvisorPtMap = {};
(ADVISORS || []).forEach(function(a) {
  if (a.teaching_point) dynamicAdvisorPtMap[a.name] = a.teaching_point;
});

function rateColor(rate) {
  if (rate >= 30) return 'high';
  if (rate >= 15) return 'mid';
  return 'low';
}
function medalClass(idx) {
  if (idx === 0) return 'gold';
  if (idx === 1) return 'silver';
  if (idx === 2) return 'bronze';
  return '';
}
function getAdvisorTag(name) {
  if (dynamicAdvisorPtMap[name]) return dynamicAdvisorPtMap[name];
  return ADVISOR_POINT_TAG[name] || '';
}
function getAdvisorTagColor(name, isShare) {
  var tag = getAdvisorTag(name);
  if (!tag) return isShare ? '#8C92A3' : '#6B7280';
  var colorMap = isShare ? POINT_COLOR_SHARE : POINT_COLOR;
  return colorMap[tag] || (isShare ? '#8C92A3' : '#6B7280');
}
function advisorTagPill(name) {
  var tag = getAdvisorTag(name);
  if (!tag) return '';
  var color = getAdvisorTagColor(name, true);
  return '<span class="adv-point-tag" style="background:' + color + '">' + tag + '</span>';
}

// ── KPI ──
function renderKPIs() {
  var s = STATS;
  var cards = [
    { label: '在读 PV', value: s.active_pv, cls: 'blue', sub: '在读人次' },
    { label: '退费 PV', value: s.refund_pv, cls: 'red', sub: '退费人次' },
    { label: '续报 PV', value: s.renewed_pv, cls: 'green', sub: '续报率 ' + s.total_renewal_rate + '%' },
    { label: '续报率', value: s.total_renewal_rate + '%', cls: 'amber', sub: '在读UV ' + s.active_uv },
  ];
  document.getElementById('kpiGrid').innerHTML = cards.map(function(c) {
    return '<div class="kpi-card ' + c.cls + '"><div class="kpi-label">' + c.label + '</div><div class="kpi-value">' + c.value + '</div><div class="kpi-sub">' + c.sub + '</div></div>';
  }).join('');
}

// ── 图表 ──
function renderChart() {
  var ctx = document.getElementById('mainChart').getContext('2d');
  if (mainChart) { mainChart.destroy(); mainChart = null; }

  var periods = PERIODS;
  var activeData = periods.map(function(p) {
    return (STATS.by_period && STATS.by_period[p]) ? (STATS.by_period[p].active_pv || 0) : 0;
  });
  var refundData = periods.map(function(p) {
    return (STATS.by_period && STATS.by_period[p]) ? (STATS.by_period[p].refund_pv || 0) : 0;
  });
  var renewData = periods.map(function(p) {
    return (STATS.by_period && STATS.by_period[p]) ? (STATS.by_period[p].renewed_pv || 0) : 0;
  });
  var rateData = periods.map(function(p, i) {
    return activeData[i] > 0 ? parseFloat((renewData[i] / activeData[i] * 100).toFixed(1)) : 0;
  });

  mainChart = new Chart(ctx, {
    type: 'bar',
    data: {
      labels: periods,
      datasets: [
        { label: '在读 PV', data: activeData, backgroundColor: C.math, stack: 's1', maxBarThickness: 56 },
        { label: '退费 PV', data: refundData, backgroundColor: C.accentRed, stack: 's1', maxBarThickness: 56 },
        { label: '续报 PV', data: renewData, backgroundColor: C.success, stack: 's1', maxBarThickness: 56 },
        { label: '续报率', data: rateData, type: 'line', borderColor: C.accentOrange, backgroundColor: 'rgba(232,148,59,0.1)', fill: false, tension: 0.3, yAxisID: 'y1', pointRadius: 4 },
      ]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      scales: {
        x: { stacked: true },
        y: { stacked: true, beginAtZero: true },
        y1: { position: 'right', beginAtZero: true, max: 100, grid: { display: false } }
      },
      plugins: { legend: { display: false } }
    }
  });
}

// ── 主讲排行（统一字段：active/should_renew/pre_renewed/new_renewed/total_renewed）──
function renderTeacherRanking() {
  var container = document.getElementById('teacherRankList');
  var mode = teacherRankMode;
  var list = TEACHERS || [];

  if (!list.length) { container.innerHTML = '<div class="empty-hint">暂无数据</div>'; return; }

  container.innerHTML = list.slice(0, 10).map(function(t, idx) {
    var medal = medalClass(idx);
    var pillCls = SUBJECT_PILL_CLASS[t.subject] || '';
    var pillText = SUBJECT_SHORT[t.subject] || '';
    var rate = mode === 'renewal' ? t.renewal_rate : t.conv_rate;
    var rc = rateColor(rate);

    // 统一字段
    var active = t.active || 0;
    var shouldRenew = t.should_renew || 0;
    var newRenewed = t.new_renewed || 0;
    var totalRenewed = t.total_renewed || 0;

    // 卡片字段统一：在读、应续、当期转化、已续费
    var stats = '<span>在读 <strong>' + active + '</strong></span>' +
      '<span>应续 <strong>' + shouldRenew + '</strong></span>' +
      '<span>转化 <strong>' + newRenewed + '</strong></span>' +
      '<span>已续 <strong>' + totalRenewed + '</strong></span>';

    return '<div class="rank-item">' +
      '<div class="rank-num ' + medal + '">' + (idx + 1) + '</div>' +
      '<div class="rank-info"><div class="rank-name"><span class="subj-pill ' + pillCls + '">' + pillText + '</span>' + t.name + '</div>' +
      '<div class="rank-stats">' + stats + '</div></div>' +
      '<div class="rank-rate ' + rc + '">' + rate + '%</div></div>';
  }).join('');
}

// ── 顾问排行（全称标签 + should_renew后端字段）──
function renderAdvisorRanking() {
  var container = document.getElementById('advisorRankList');
  var mode = advisorRankMode;
  var isUV = advisorUVMode === 'uv';
  var list = ADVISORS || [];

  if (!list.length) { container.innerHTML = '<div class="empty-hint">暂无数据</div>'; return; }

  container.innerHTML = list.slice(0, 10).map(function(a, idx) {
    var medal = medalClass(idx);
    var tagPill = advisorTagPill(a.name);

    // UV/PV维度数据
    var active = isUV ? a.active : (a.pv_active || a.active);
    var should = isUV ? a.should_renew : (a.pv_should_renew || (active - (a.pv_pre_renewed || a.pre_renewed)));
    var newR = isUV ? a.new_renewed : (a.pv_new_renewed || a.new_renewed);
    var total = isUV ? a.total_renewed : (a.pv_total_renewed || a.total_renewed);

    var rate = mode === 'renewal'
      ? (active > 0 ? (total / active * 100).toFixed(1) : 0)
      : (should > 0 ? (newR / should * 100).toFixed(1) : 0);
    var rc = rateColor(rate);

    // 卡片字段统一：在读、应续、当期转化、已转化（顾问维度）
    var dim = isUV ? 'UV' : 'PV';
    var stats = '<span>' + dim + ' <strong>' + active + '</strong></span>' +
      '<span>应续 <strong>' + should + '</strong></span>' +
      '<span>转化 <strong>' + newR + '</strong></span>' +
      '<span>已续 <strong>' + total + '</strong></span>';

    return '<div class="rank-item">' +
      '<div class="rank-num ' + medal + '">' + (idx + 1) + '</div>' +
      '<div class="rank-info"><div class="rank-name">' + tagPill + ' ' + a.name + '</div>' +
      '<div class="rank-stats">' + stats + '</div></div>' +
      '<div class="rank-rate ' + rc + '">' + rate + '%</div></div>';
  }).join('');
}

// ── 切换按钮 ──
function switchTeacherMode(mode) {
  teacherRankMode = mode;
  document.querySelectorAll('#teacherRankTitle ~ .mode-toggle .mode-btn').forEach(function(btn) {
    btn.classList.toggle('active', btn.dataset.mode === mode);
  });
  var titleSuffix = mode === 'renewal' ? '续报率排行' : '转化率排行';
  document.getElementById('teacherRankTitle').textContent = '主讲' + titleSuffix;
  renderTeacherRanking();
}

function switchAdvisorMode(mode) {
  advisorRankMode = mode;
  var btns = document.querySelectorAll('#advisorRankTitle ~ div .mode-toggle:first-child .mode-btn');
  btns.forEach(function(btn) { btn.classList.toggle('active', btn.dataset.mode === mode); });
  var titleSuffix = mode === 'renewal' ? '续报排行' : '转化排行';
  document.getElementById('advisorRankTitle').textContent = '顾问' + titleSuffix;
  renderAdvisorRanking();
}

function switchAdvisorUVMode(uvMode) {
  advisorUVMode = uvMode;
  var btns = document.querySelectorAll('#advisorRankTitle ~ div .mode-toggle:last-child .mode-btn');
  btns.forEach(function(btn) { btn.classList.toggle('active', btn.dataset.uv === uvMode); });
  renderAdvisorRanking();
}

// ── 初始化 ──
renderKPIs();
renderChart();
renderTeacherRanking();
renderAdvisorRanking();
</script>
