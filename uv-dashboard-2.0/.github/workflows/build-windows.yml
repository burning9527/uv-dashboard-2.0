name: Build Windows .exe

on:
  # 手动触发
  workflow_dispatch:
  # 推送 main 分支时自动触发
  push:
    branches: [ main ]

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build with PyInstaller
        run: pyinstaller uv_dashboard2_win.spec --noconfirm

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: UV-Dashboard-2.0-Windows
          path: dist/UV Dashboard 2.0/
          retention-days: 30

      - name: Create ZIP archive
        run: Compress-Archive -Path "dist\UV Dashboard 2.0\*" -DestinationPath "UV-Dashboard-2.0-Windows.zip"

      - name: Upload ZIP
        uses: actions/upload-artifact@v4
        with:
          name: UV-Dashboard-2.0-Windows-ZIP
          path: UV-Dashboard-2.0-Windows.zip
          retention-days: 30
