name: Build Windows .exe

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build-windows:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: uv-dashboard-2.0
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: List installed packages
        run: pip list

      - name: Build with PyInstaller
        run: pyinstaller uv_dashboard2_win.spec --noconfirm --log-level WARN

      - name: List dist contents
        if: always()
        run: dir "dist\UV Dashboard 2.0" 2>nul || echo "dist not found"

      - name: Upload artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: UV-Dashboard-2.0-Windows
          path: uv-dashboard-2.0/dist/UV Dashboard 2.0/
          retention-days: 30

      - name: Create ZIP archive
        if: success()
        run: Compress-Archive -Path "dist\UV Dashboard 2.0\*" -DestinationPath "UV-Dashboard-2.0-Windows.zip"

      - name: Upload ZIP
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: UV-Dashboard-2.0-Windows-ZIP
          path: uv-dashboard-2.0/UV-Dashboard-2.0-Windows.zip
          retention-days: 30
